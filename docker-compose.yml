version: "3.9"

services:
  hardhat:
    build:
      context: ./hardhat
    container_name: hardhat
    ports:
      - "8545:8545"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:3001
      - VITE_RPC_URL=https://polygon-amoy.g.alchemy.com/v2/BoGnIXXbmFc8Qj4Ge1NlB
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: workspace
    command: sleep infinity
    networks:
      - app-network
    volumes:
      - .:/workspace
      - workspace-hardhat-modules:/workspace/hardhat/node_modules
      - workspace-backend-modules:/workspace/backend/node_modules
      - workspace-frontend-modules:/workspace/frontend/node_modules

networks:
  app-network:
    driver: bridge

volumes:
  workspace-hardhat-modules:
  workspace-backend-modules:
  workspace-frontend-modules:
  backend-data: